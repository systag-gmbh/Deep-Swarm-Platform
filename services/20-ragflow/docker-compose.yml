services:
  ragflow:
    image: infiniflow/ragflow:v0.24.0
    hostname: ragflow
    labels:
      deepswarm.backup.stop: "true"
    depends_on:
      ragflow-mysql:
        condition: service_healthy
      ragflow-es:
        condition: service_healthy
      ragflow-redis:
        condition: service_started
      ragflow-minio:
        condition: service_started
    volumes:
      - ${DATA_PATH}/ragflow/logs:/ragflow/logs
      - ${DATA_PATH}/ragflow/data:/ragflow/data
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
    environment:
      DOC_ENGINE: elasticsearch
      MYSQL_HOST: ragflow-mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD:-infini_rag_flow}
      MYSQL_DBNAME: rag_flow
      ES_HOST: ragflow-es
      ES_PORT: 9200
      ELASTIC_PASSWORD: ${RAGFLOW_ES_PASSWORD:-infini_rag_flow}
      MINIO_HOST: ragflow-minio
      MINIO_PORT: 9000
      MINIO_USER: rag_flow
      MINIO_PASSWORD: ${RAGFLOW_MINIO_PASSWORD:-infini_rag_flow}
      REDIS_HOST: ragflow-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${RAGFLOW_REDIS_PASSWORD:-infini_rag_flow}
      TZ: ${TZ:-Europe/Berlin}
    networks:
      - proxy
      - ragflow-internal
      - ai-internal
    restart: unless-stopped

  ragflow-mysql:
    image: mysql:8.0.39
    hostname: ragflow-mysql
    labels:
      deepswarm.backup.stop: "true"
    volumes:
      - ${DATA_PATH}/ragflow/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD:-infini_rag_flow}
      MYSQL_DATABASE: rag_flow
      TZ: ${TZ:-Europe/Berlin}
    command:
      - --max_connections=1000
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=1073741824
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${RAGFLOW_MYSQL_PASSWORD:-infini_rag_flow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ragflow-internal
    restart: unless-stopped

  ragflow-es:
    image: elasticsearch:8.11.3
    hostname: ragflow-es
    labels:
      deepswarm.backup.stop: "true"
    volumes:
      - ${DATA_PATH}/ragflow/elasticsearch:/usr/share/elasticsearch/data
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${RAGFLOW_ES_PASSWORD:-infini_rag_flow}
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      TZ: ${TZ:-Europe/Berlin}
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${RAGFLOW_ES_PASSWORD:-infini_rag_flow} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - ragflow-internal
    restart: unless-stopped

  ragflow-minio:
    image: minio/minio:latest
    hostname: ragflow-minio
    labels:
      deepswarm.backup.stop: "true"
    volumes:
      - ${DATA_PATH}/ragflow/minio:/data
    environment:
      MINIO_ROOT_USER: rag_flow
      MINIO_ROOT_PASSWORD: ${RAGFLOW_MINIO_PASSWORD:-infini_rag_flow}
      TZ: ${TZ:-Europe/Berlin}
    command: server /data --console-address ":9001"
    networks:
      - ragflow-internal
    restart: unless-stopped

  ragflow-redis:
    image: valkey/valkey:8
    hostname: ragflow-redis
    labels:
      deepswarm.backup.stop: "true"
    volumes:
      - ${DATA_PATH}/ragflow/redis:/data
    environment:
      TZ: ${TZ:-Europe/Berlin}
    command: valkey-server --requirepass ${RAGFLOW_REDIS_PASSWORD:-infini_rag_flow} --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ragflow-internal
    restart: unless-stopped

networks:
  proxy:
    name: ${PROJECT_NAME}_proxy
    external: true
  ragflow-internal:
    name: ${PROJECT_NAME}_ragflow
  ai-internal:
    name: ${PROJECT_NAME}_ai-internal
    external: true
